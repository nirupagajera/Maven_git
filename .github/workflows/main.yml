name: Trigger Swagify Automation

on:
  push:
    branches:
      - main
      - BranchX

  pull_request:
    branches:
      - main
      - BranchX

  workflow_dispatch:

jobs:
  trigger-playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Swagify Playwright Tests
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.QA_REPO_TOKEN }}" \
            https://api.github.com/repos/nirupagajera/Swagify/actions/workflows/deployment-playwright.yml/dispatches \
            -d '{"ref":"main","inputs":{"test_suite":"full"}}'
