name: Maven Git Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Maven_git repo
        uses: actions/checkout@v4

      - name: Trigger Swagify Playwright Tests
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.QA_REPO_TOKEN }}" \
            https://api.github.com/repos/nirupagajera/Swagify/actions/workflows/deployment-playwright.yml/dispatches \
            -d '{"ref":"main","inputs":{"test_suite":"full"}}'
